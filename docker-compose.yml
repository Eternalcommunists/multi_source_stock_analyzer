version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-analyzer-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - AKSHARE_ENABLED=true
    networks:
      - stock-network
    volumes:
      - ./.env:/app/.env

networks:
  stock-network:
    driver: bridge